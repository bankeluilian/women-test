<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>女作家人格测试 - 寻访你的文学灵魂</title>
  <meta name="description" content="基于文学审美与心理学四大维度，18道专业测试题，找出潜藏在你体内的文学化身。" />
  <meta property="og:title" content="女作家人格测试 — 寻访你的文学灵魂" />
  <meta property="og:description" content="你的笔触，出卖了你的灵魂。" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== 变量 ===== */
    :root {
      --bg: #f5f1ea;
      --bg-warm: #ede8df;
      --bg-track: #e8e2d8;
      --title: #2c2416;
      --body: #4a4035;
      --body-light: #7a7062;
      --subtitle: #8b7e6e;
      --accent: #8b6914;
      --accent-light: #c4a54a;
      --ornament: #b8a88a;
      --border-light: #e0d8cc;
      --radius: 0.625rem;
    }

    /* ===== 重置 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body {
      background-color: var(--bg);
      color: var(--body);
      font-family: 'LXGW WenKai', 'Noto Serif SC', 'Songti SC', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.7;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    button { border: none; outline: none; font-family: inherit; cursor: pointer; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ornament); border-radius: 3px; opacity: 0.4; }
    ::-webkit-scrollbar-thumb:hover { opacity: 0.7; }
    ::selection { background-color: rgba(139,105,20,0.2); color: var(--title); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ===== 纸纹理背景 ===== */
    .paper-bg {
      position: fixed; inset: 0; z-index: 0; opacity: 0.025; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238b7355' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    @media (max-width: 640px) { .paper-bg { display: none; } }

    /* ===== 浮动粒子 ===== */
    .particle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      background-color: rgba(139,115,85,0.25);
    }
    @media (max-width: 640px) { .particle { display: none; } }

    /* ===== 主容器 ===== */
    .container {
      position: relative; z-index: 1; max-width: 42rem; margin: 0 auto;
      padding: 0 1rem;
    }

    /* ===== 分割线 ===== */
    .divider {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      margin: 1rem 0; opacity: 0.3;
    }
    .divider-line { flex: 0 0 3rem; height: 1px; background: var(--ornament); }
    .divider svg { width: 14px; height: 14px; color: var(--ornament); }

    /* ===== 屏幕通用 ===== */
    .screen {
      display: none;
      padding: 2rem 1rem 3rem;
      animation: fadeSlideIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-12px); }
    }
    @keyframes optionIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ===== 翻书动画 ===== */
    .book-wrap {
      perspective: 1200px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
    }
    .book {
      position: relative;
      width: 64px; height: 88px;
      transform-style: preserve-3d;
    }
    .book-cover {
      position: absolute; width: 100%; height: 100%;
      background: linear-gradient(135deg, #c8b89a, #a08c6e);
      border-radius: 3px 6px 6px 3px;
      box-shadow: 2px 4px 14px rgba(90,70,50,0.35), inset -1px 0 0 rgba(0,0,0,0.15);
      transform-origin: left center;
      z-index: 2;
    }
    .book-cover::after {
      content: '';
      position: absolute;
      right: 0; top: 6px; bottom: 6px;
      width: 3px;
      background: rgba(0,0,0,0.12);
      border-radius: 0 2px 2px 0;
    }
    /* 书脊 */
    .book-spine {
      position: absolute; left: 0; top: 0;
      width: 10px; height: 100%;
      background: linear-gradient(90deg, #9a8060, #b8a080);
      border-radius: 3px 0 0 3px;
      transform-origin: right center;
      z-index: 1;
    }
    /* 翻动的页 */
    .book-page {
      position: absolute; right: 6px; top: 4px;
      width: calc(100% - 10px); height: calc(100% - 8px);
      background: linear-gradient(90deg, #f5f0e6, #ece6d8);
      border-radius: 0 4px 4px 0;
      box-shadow: inset 1px 0 2px rgba(0,0,0,0.08);
      transform-origin: left center;
      z-index: 1;
    }
    /* 页翻转动画 */
    .page-flip {
      animation: pageFlip 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes pageFlip {
      0%   { transform: rotateY(0deg); z-index: 3; }
      35%  { transform: rotateY(-160deg); z-index: 3; }
      36%  { z-index: 1; }
      100% { transform: rotateY(-180deg); z-index: 1; }
    }
    /* 页面堆积效果 */
    .page-stack {
      position: absolute; right: 6px; top: 4px;
      width: calc(100% - 10px); height: calc(100% - 8px);
      background: #f0ead8;
      border-radius: 0 4px 4px 0;
      z-index: 0;
    }
    .page-stack:nth-child(2) { transform: translateZ(-2px); }
    .page-stack:nth-child(3) { transform: translateZ(-4px); }
    .page-stack:nth-child(4) { transform: translateZ(-6px); }

    /* 翻页计数器文字 */
    .page-counter {
      font-size: 0.75rem; color: var(--body-light);
      letter-spacing: 0.15em; margin-top: 0.75rem;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ===== 欢迎页 ===== */
    #welcome-screen {
      min-height: 100dvh; justify-content: center; text-align: center;
      padding-top: 3rem; padding-bottom: 3rem;
    }
    .icon-circle {
      width: 5rem; height: 5rem; border-radius: 50%;
      background: linear-gradient(135deg, #d4c4a8, #a08c6e);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(160,140,110,0.2);
      animation: iconIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }
    @keyframes iconIn {
      from { transform: scale(0) rotate(-180deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .icon-circle svg { width: 2.25rem; height: 2.25rem; color: white; }
    .main-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 2rem; font-weight: 300;
      letter-spacing: 0.12em; color: var(--title);
      margin-bottom: 0.5rem;
    }
    .main-subtitle {
      font-size: 0.875rem; color: var(--subtitle);
      letter-spacing: 0.25em; margin-bottom: 1rem;
    }
    .intro-text {
      font-size: 0.9rem; line-height: 1.8; color: var(--body);
      max-width: 20rem; margin: 0 auto 1.25rem;
    }
    .intro-meta {
      font-size: 0.75rem; color: var(--body-light); margin-bottom: 0.5rem;
    }

    /* ===== 维度卡片 ===== */
    .dim-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
      width: 100%; max-width: 20rem; margin-bottom: 2rem;
    }
    .dim-card {
      background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
      border: 1px solid var(--border-light);
      border-radius: 0.75rem; padding: 0.75rem 0.5rem;
      text-align: center;
    }
    .dim-labels { display: flex; align-items: center; justify-content: center; gap: 0.25rem; margin-bottom: 0.25rem; }
    .dim-tag {
      font-size: 0.7rem; font-weight: 500;
      padding: 0.125rem 0.5rem; border-radius: 999px;
      background: var(--bg-warm); color: var(--accent);
    }
    .dim-vs { font-size: 0.625rem; color: var(--body-light); }
    .dim-names { font-size: 0.7rem; color: var(--body-light); line-height: 1.4; }

    /* ===== 按钮 ===== */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border-radius: 999px;
      font-size: 0.875rem; font-weight: 500; letter-spacing: 0.15em;
      color: white; background: #2c2416;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: box-shadow 0.15s;
    }
    .btn-primary:active { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn-primary svg { width: 1rem; height: 1rem; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.625rem 1.25rem; border-radius: 999px;
      font-size: 0.8rem; letter-spacing: 0.1em;
      border: 1px solid var(--border-light); color: var(--body);
      background: transparent; transition: background 0.15s;
    }
    .btn-outline:active { background: rgba(255,255,255,0.8); }
    .btn-share {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.625rem 1.25rem; border-radius: 999px;
      font-size: 0.8rem; letter-spacing: 0.1em;
      color: white; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: box-shadow 0.15s;
    }
    .btn-share:active { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn-share svg { width: 0.875rem; height: 0.875rem; }

    /* ===== 答题页 ===== */
    #quiz-screen { min-height: 100dvh; padding-top: 1.5rem; padding-bottom: 1.5rem; }
    .progress-bar-wrap { width: 100%; max-width: 36rem; margin: 0 auto 1.5rem; }
    .progress-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem;
    }
    .progress-count { font-size: 0.7rem; color: var(--body-light); font-weight: 500; }
    .progress-dim { font-size: 0.7rem; color: var(--subtitle); }
    .progress-track {
      width: 100%; height: 5px; background: var(--bg-track);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      transition: width 0.4s ease-out;
    }
    .question-card {
      width: 100%; max-width: 36rem; margin: 0 auto 1rem;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
      border: 1px solid var(--border-light); border-radius: 1.25rem;
      padding: 1.25rem 1.5rem;
    }
    .question-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem; line-height: 1.75; color: var(--title); font-weight: 300;
    }
    .options-list { width: 100%; max-width: 36rem; margin: 0 auto; display: flex; flex-direction: column; gap: 0.5rem; }
    .option-btn {
      width: 100%; text-align: left;
      background: rgba(255,255,255,0.65); backdrop-filter: blur(8px);
      border: 1px solid var(--border-light); border-radius: 0.875rem;
      padding: 0.875rem 1rem;
      display: flex; align-items: flex-start; gap: 0.75rem;
      transition: background 0.15s;
      animation: optionIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    .option-btn:hover { background: rgba(237,232,223,0.9); }
    .option-btn:active { transform: scale(0.98); }
    .option-letter {
      flex-shrink: 0; width: 1.75rem; height: 1.75rem;
      border-radius: 50%; background: var(--bg-warm); color: var(--accent);
      font-size: 0.7rem; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }
    .option-text { font-size: 0.875rem; line-height: 1.65; color: var(--body); }

    /* ===== 计算过渡页 ===== */
    #calc-screen { min-height: 70dvh; justify-content: center; text-align: center; }
    .calc-icon { margin-bottom: 1rem; animation: rotate360 2.5s linear infinite; }
    .calc-icon svg { width: 2.25rem; height: 2.25rem; color: var(--accent); opacity: 0.4; }
    .calc-text {
      font-size: 0.8rem; color: var(--body-light);
      letter-spacing: 0.3em; animation: pulse 2.2s ease-in-out infinite;
    }

    /* ===== 翻书过渡 overlay ===== */
    #book-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #book-overlay.active { display: flex; }

    /* ===== 结果页 ===== */
    #result-screen { padding-left: 0.5rem; padding-right: 0.5rem; }
    .result-inner { max-width: 36rem; margin: 0 auto; }
    .result-header { text-align: center; margin-top: 1.5rem; margin-bottom: 1rem; }
    .avatar {
      width: 8rem; height: 8rem; border-radius: 50%; margin: 0 auto 1.25rem;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; font-family: 'Noto Serif SC', serif;
      font-size: 2.5rem; font-weight: 300;
      border: 3px solid; position: relative; overflow: hidden;
    }
    .avatar-init { line-height: 1; }
    .avatar-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; }
    .avatar-placeholder svg { width: 2rem; height: 2rem; opacity: 0.4; }
    .avatar-placeholder span { font-size: 0.625rem; opacity: 0.4; }
    .avatar-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .avatar-img.show { display: block; }
    .result-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.75rem; font-weight: 300;
      letter-spacing: 0.1em; margin-bottom: 0.25rem;
    }
    .result-meta { font-size: 0.75rem; color: var(--body-light); letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .result-works { font-size: 0.7rem; color: var(--body-light); letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .result-badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.25rem 1rem; border-radius: 999px;
      font-size: 0.8rem; border: 1px solid;
    }
    .result-badge svg { width: 0.75rem; height: 0.75rem; }

    /* ===== 结果卡片 ===== */
    .result-card {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
      border: 1px solid var(--border-light); border-radius: 1.25rem;
      padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
    }
    .result-card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.875rem; color: var(--title);
      padding-bottom: 0.625rem; margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border-light);
      letter-spacing: 0.12em;
    }
    .result-card-body { font-size: 0.875rem; line-height: 1.9; color: var(--body-light); }

    /* ===== 光谱 ===== */
    .spectrum-bar-wrap { margin-bottom: 0.75rem; }
    .spectrum-labels { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
    .spectrum-label { font-size: 0.7rem; color: var(--body-light); }
    .spectrum-bar { display: flex; height: 6px; border-radius: 999px; overflow: hidden; background: var(--bg-warm); }
    .spectrum-fill-left { height: 100%; border-radius: 999px 0 0 999px; transition: width 0.7s ease-out; }
    .spectrum-fill-right { height: 100%; border-radius: 0 999px 999px 0; transition: width 0.7s ease-out; }
    .spectrum-divider { width: 1px; background: rgba(255,255,255,0.8); }

    /* ===== 标签 ===== */
    .tags-row {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 0.375rem;
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1px solid var(--border-light);
    }
    .tag {
      font-size: 0.7rem; padding: 0.2rem 0.75rem;
      border-radius: 999px; border: 1px solid;
    }

    /* ===== 名言 ===== */
    .quote-card {
      position: relative; border-radius: 1.25rem;
      padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; overflow: hidden;
      border-left: 3px solid;
    }
    .quote-mark {
      position: absolute; top: -0.5rem; left: 0.75rem;
      font-size: 4rem; opacity: 0.1; font-family: Georgia, serif;
      line-height: 1; pointer-events: none;
    }
    .quote-text {
      position: relative; z-index: 1;
      font-family: 'Noto Serif SC', Georgia, serif;
      font-size: 0.9rem; line-height: 1.85; font-style: italic; color: var(--body);
      padding-left: 1.25rem;
    }
    .quote-author { position: relative; z-index: 1; text-align: right; font-size: 0.7rem; color: var(--body-light); margin-top: 0.5rem; padding-right: 0.25rem; }

    /* ===== 结果按钮 ===== */
    .result-actions { display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .share-toast {
      text-align: center; font-size: 0.7rem; color: var(--accent);
      margin-top: 0.75rem; letter-spacing: 0.1em;
      animation: fadeSlideIn 0.3s ease;
    }

    /* ===== 工具 ===== */
    @media (max-width: 640px) {
      body { font-size: 16px; }
      .main-title { font-size: 1.65rem; }
      .question-card { padding: 1rem 1.25rem; }
      .question-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div class="paper-bg"></div>

<!-- 浮动粒子 -->
<div id="particles"></div>

<div class="container">
  <!-- ===== 欢迎页 ===== -->
  <div id="welcome-screen" class="screen active">
    <div class="icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <h1 class="main-title">女作家人格测试</h1>
    <p class="main-subtitle">寻访你心底的文学灵魂</p>
    <div class="divider">
      <div class="divider-line"></div>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
      <div class="divider-line"></div>
    </div>
    <p class="intro-text">
      每个人心中都住着一位作家。<br/>
      她替你感受世界，替你说出那些未能出口的话。
    </p>
    <p class="intro-meta">18 道题 · 4 个选项 · 四大维度</p>

    <div class="dim-grid" id="dim-grid"></div>

    <button class="btn-primary" onclick="startQuiz()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
      启程
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>

  <!-- ===== 答题页 ===== -->
  <div id="quiz-screen" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-top">
        <span class="progress-count" id="q-count">1 / 18</span>
        <span class="progress-dim" id="q-dim"></span>

  {code:"IFNP",name:"弗吉尼亚·伍尔夫",nameEn:"Virginia Woolf",era:"1882 – 1941",works:"《达洛维夫人》《到灯塔去》《一间自己的房间》",title:"在意识的深海里独自泅渡",tags:["内向","感性","理想","先锋"],analysis:"你感知世界的方式与众人截然不同——当别人看见一棵树，你看见的却是它从种子到枯木的全部时间层层叠压。你的意识如同一片深海，表面波澜不惊，深处却暗流奔涌。你能在同一瞬间承接一千种情绪的共振，它们在你体内汇聚成一股无法用语言尽述的巨大回响。这种天赋令你既强大又脆弱：强大在于你能触及大多数人穷尽一生都无法抵达的精神深处，脆弱在于——你根本无处关闭这道闸门。你写作不是因为想要表达，而是因为不写出来，那些感知的洪流便会将你彻底淹没。",style:"你的文字是对线性叙事的一次温柔叛逃。你从不在意\"发生了什么\"，你在意的始终是\"在发生与发生的缝隙之间，一个人究竟经历了什么\"。一个角色去买花，她的一生便在你笔下随之涌来——童年的花园、破碎的婚姻、某个无法命名的下午。你用句子搭建的不是桥梁，而是由镜子碎片拼成的万花筒——每换一个角度，便映出真实的不同切面。",quote:"「一个人能使自己成为自己，比什么都重要。」",color:"#6b7c8e"},

  {code:"ITNJ",name:"厄休拉·勒古恩",nameEn:"Ursula K. Le Guin",era:"1929 – 2018",works:"《黑暗的左手》《地海传说》系列",title:"在星际间搭建思想实验室的造物者",tags:["内向","理性","理想","古典"],analysis:"你的思维尺度令大多数人感到陌生——当世人在小情小爱中徘徊时，你在思索的是文明的可能性、是性别的本质、是权力结构的底层密码。你不是激进的批判者，而是安静的造物者——你构建一整个世界，然后令其自行言说。你的思想之宽广令人惊叹：你同时理解秩序与自由、个体与集体、已知与未知。你是一位罕见的乐观主义者——不是因为世界本善，而是因为你相信想象本身拥有改变世界的力量。",style:"你的文字清澈如冰山下的湖水——表面平静得近乎冷酷，深处却蕴藏着整个宇宙。你构建的世界如此完整，以至于读者合上书后常会产生一种奇异的恍惚：仿佛那个世界真实存在于某个遥远的星球。你是思想的实验者，却从不将实验变成说教——故事永远是第一位的，而思考不过是故事自然流淌出来的余韵。",quote:"「真正的冒险不是去到远方，而是用全新的眼睛去看。」",color:"#4a6741"},
  {code:"IFSP",name:"西尔维娅·普拉斯",nameEn:"Sylvia Plath",era:"1932 – 1963",works:"《钟形罩》《爱丽尔》",title:"用血与玻璃书写的自白者",tags:["内向","感性","现实","先锋"],analysis:"你的感知力如同一柄无鞘的利刃——世界轻轻触碰，你便渗出血来。落叶在耳中化作丧钟，路人的一个眼神足以令你彻夜难眠，而某句无意的话语或许会在你体内回响一生。这不是脆弱——这是一种远超常人的感受密度。你渴望完美，却时时感知着完美与现实之间那道巨大的裂缝，它令你痛苦，也令你成为诗人。你的文字之所以在半个世纪后仍能一击即中，是因为它们不是\"写\"出来的，而是从你的骨血中\"生长\"出来的。",style:"自白派不粉饰、不拐弯、不给自己留任何退路。你的比喻锋利到足以割破手指——\"感觉自己被困在钟形罩里，外面的世界嘶嘶作响，声音却无法传入。\"你从不写\"悲伤\"二字，你写悲伤的形状、颜色、温度与重量。你令读者不是\"理解\"你的痛苦，而是\"亲身经历\"它。这是最高级别的残忍，亦是最高级别的共情。",quote:"「我觉得自己非常无知，又非常有教养，非常安静，又非常疯狂。」",color:"#7b3f5e"},
  {code:"ETSJ",name:"阿加莎·克里斯蒂",nameEn:"Agatha Christie",era:"1890 – 1976",works:"《无人生还》《东方快车谋杀案》《尼罗河上的惨案》",title:"掌控全局的幕后执棋人",tags:["外向","理性","现实","古典"],analysis:"你是天赋异禀的棋手——当众人仍被表象迷惑时，你已洞悉整盘棋局。你观察人的方式近乎本能：衣领上一道不经意的褶皱、回答时那多半拍的停顿、一个不合时宜的微笑——这些旁人眼中毫无意义的细节，在你脑海中自动拼合成一幅完整的图景。你享受掌控全局的感觉——并非出于权力欲，而是因为你热爱\"秩序\"本身。当世界陷入混乱，你是那个最冷静的人：因为你知道，只要足够耐心，真相终将自行浮出水面。",style:"你追求的从来不是文学的华丽，而是结构的精密——每一个伏笔恰到好处，每一个转折令人拍案叫绝。你写的不仅是推理小说，你写的是人性的标本室：每一位嫌疑人都是一种人性的可能性，而最终的真相往往令人豁然开朗——最不可能的人，才是是最接近真实的那一个。你的文字干净利落，从不浪费一个形容词——恰如你下棋，从不浪费一步。",quote:"「每个人都是嫌疑人，直到真相把他们从名单上划掉。」",color:"#6b5b4e"},

const dimensionInfo = [
  {key:'IE',left:{letter:'I',label:'向内走'},right:{letter:'E',label:'向外走'}},
  {key:'TF',left:{letter:'T',label:'理性之刃'},right:{letter:'F',label:'感性之火'}},
  {key:'SN',left:{letter:'S',label:'大地的脚印'},right:{letter:'N',label:'星空的凝望'}},
  {key:'JP',left:{letter:'J',label:'秩序之美'},right:{letter:'P',label:'混沌之美'}},
];

const TRAIT_LABELS = {I:'内向',E:'外向',T:'理性',F:'感性',S:'现实',N:'理想',J:'古典',P:'先锋'};
const LETTERS = ['A','B','C','D'];

// ===== 状态 =====
let currentQ = 0;
let scores = {I:0,E:0,T:0,F:0,S:0,N:0,J:0,P:0};
let currentResult = null;

// ===== 粒子 =====
(function initParticles(){
  const data = [
    {id:0,s:3,x:12,y:20,d:14,dl:0,op:0.08},
    {id:1,s:5,x:85,y:15,d:11,dl:2,op:0.06},
    {id:2,s:2,x:45,y:70,d:16,dl:4,op:0.10},
    {id:3,s:4,x:70,y:45,d:13,dl:1,op:0.07},
    {id:4,s:3,x:25,y:85,d:15,dl:3,op:0.05},
    {id:5,s:6,x:90,y:75,d:12,dl:5,op:0.04},
    {id:6,s:2,x:55,y:10,d:17,dl:2.5,op:0.09},
    {id:7,s:4,x:8,y:55,d:10,dl:1.5,op:0.06},
    {id:8,s:3,x:78,y:92,d:14,dl:3.5,op:0.05},
    {id:9,s:5,x:35,y:35,d:11,dl:0.5,op:0.07},
  ];
  const container = document.getElementById('particles');
  data.forEach(p => {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `width:${p.s}px;height:${p.s}px;left:${p.x}%;top:${p.y}%;opacity:${p.op};`;
    container.appendChild(el);
    animateParticle(el, p);
  });
})();

function animateParticle(el, p) {
  let t = 0;
  function step() {
    t += 0.016;
    const y = Math.sin(t * 0.5 + p.dl) * 20;
    const x = Math.cos(t * 0.4 + p.dl) * 12;
    el.style.transform = `translate(${x}px,${y - 10}px)`;
    requestAnimationFrame(step);
  }
  setTimeout(() => requestAnimationFrame(step), p.dl * 1000);
}

// ===== 维度卡片 =====
(function buildDimGrid(){
  const grid = document.getElementById('dim-grid');
  dimensionInfo.forEach(d => {
    const card = document.createElement('div');
    card.className = 'dim-card';
    card.innerHTML = `

// ===== 屏幕切换 =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== 渲染题目 =====
function renderQuestion() {
  const q = questions[currentQ];
  const progress = ((currentQ + 1) / questions.length) * 100;
  const dim = dimensionInfo.find(d => d.key === q.dimension[0] + q.dimension[1]);

  document.getElementById('q-count').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-dim').textContent = dim ? `${dim.left.letter} · ${dim.right.letter}` : '';
  document.getElementById('progress-fill').style.width = progress + '%';
  document.getElementById('q-text').textContent = q.question;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.animationDelay = (i * 0.06) + 's';
    btn.innerHTML = `
      <span class="option-letter">${LETTERS[i]}</span>
      <span class="option-text">${opt.text}</span>
    `;
    btn.addEventListener('click', () => handleAnswer(opt.trait, opt.weight));
    list.appendChild(btn);
  });
}

// ===== 答题 =====
function handleAnswer(trait, weight) {
  scores[trait] += weight;
  if (currentQ + 1 >= questions.length) {
    // 最后一题 → 翻书过渡动画
    triggerBookFlip();
  } else {
    currentQ++;
    renderQuestion();
  }
}

// ===== 翻书动画 =====
function triggerBookFlip() {
  const overlay = document.getElementById('book-overlay');
  const page = document.getElementById('flipping-page');
  const counter = document.getElementById('book-counter');

  overlay.classList.add('active');

  // 重置动画
  page.classList.remove('page-flip');
  void page.offsetWidth; // force reflow
  page.classList.add('page-flip');

  // 计数器文字
  let count = questions.length;
  counter.textContent = `正在翻阅第 ${count} 页`;

  // 动画结束后显示结果
  setTimeout(() => {
    overlay.classList.remove('active');
    page.classList.remove('page-flip');
    showResult();
  }, 2000);
}

// ===== 结果 =====
function calculateResult() {
  const code =
    (scores.I >= scores.E ? 'I' : 'E') +
    (scores.T > scores.F ? 'T' : 'F') +
    (scores.S > scores.N ? 'S' : 'N') +
    (scores.J > scores.P ? 'J' : 'P');

  let best = writerResults[0], bestMatch = -1;
  for (const w of writerResults) {
    let m = 0;
    for (let i = 0; i < 4; i++) if (w.code[i] === code[i]) m++;
    if (m > bestMatch) { bestMatch = m; best = w; }
  }
  return best;
}

function spectrumData(result) {
  const pairs = [['I','E'],['T','F'],['S','N'],['J','P']];
  return pairs.map(([l,r]) => {
    const maxL = questions.filter(q => q.dimension.includes(l))
      .reduce((s,q) => s + q.options.filter(o=>o.trait===l).reduce((ss,o)=>ss+o.weight,0), 0);
    const maxR = questions.filter(q => q.dimension.includes(r))
      .reduce((s,q) => s + q.options.filter(o=>o.trait===r).reduce((ss,o)=>ss+o.weight,0), 0);
    const total = Math.max(maxL + maxR, 1);
    return {
      left: { trait:l, label:TRAIT_LABELS[l] },
      right: { trait:r, label:TRAIT_LABELS[r] },
      leftPct: (scores[l]/total)*100,
      rightPct: (scores[r]/total)*100,
    };
  });
}

// ===== 分享 =====
async function share() {
  const r = currentResult;
  const text = `我在「女作家人格测试」中邂逅了 ${r.name}（${r.nameEn}）—— ${r.title}\n\n「${r.quote}」`;
  const toast = document.getElementById('share-toast');

  if (navigator.share) {
    try {
      await navigator.share({ title: '女作家人格测试 — 寻访你的文学灵魂', text });
    } catch(e) {}
  } else {
    await navigator.clipboard.writeText(text);
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }
}

// ===== 重启 =====
function restart() {
  currentQ = 0;
  scores = {I:0,E:0,T:0,F:0,S:0,N:0,J:0,P:0};
  currentResult = null;
  showScreen('welcome-screen');
}

// ===== 开始 =====
